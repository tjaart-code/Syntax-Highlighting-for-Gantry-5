name: Code Highlight
description: Displays a syntax-highlighted code block using Prism.js
type: particle

form:
  fields:
    enabled:
      type: input.checkbox
      label: Enabled
      default: true

    title:
      type: input.text
      label: Title
      description: Optional heading above the code block.

    language:
      type: select.select
      label: Language
      default: javascript
      options:
        markup: HTML / XML
        css: CSS
        javascript: JavaScript
        php: PHP
        python: Python
        sql: SQL
        bash: Bash
        typescript: TypeScript
        json: JSON
        yaml: YAML

    code:
      type: textarea.textarea
      label: Code
      description: Paste your code here.

    show_line_numbers:
      type: input.checkbox
      label: Line Numbers
      default: true

    css.class:
      type: input.text
      label: CSS Class
      description: Optional extra CSS class on the wrapper.
